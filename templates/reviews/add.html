{% extends 'base.html' %}
{% block title %}Написать рецензию — {{ book.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">
                <i class="bi bi-chat-left-text me-2"></i>Рецензия на «{{ book.title }}»
            </h4>
        </div>
        <div class="card-body">
            <form method="POST" id="review-form">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Оценка</label>
                    <select name="rating" class="form-select" required>
                        {% for value, label in ratings %}
                        <option value="{{ value }}" {% if form_data.rating == value %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">На сервер отправляется только числовое значение оценки.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Текст рецензии</label>
                    <textarea name="text" id="review-editor" class="form-control" rows="8">{{ form_data.text }}</textarea>
                    <small class="text-muted">Можно использовать Markdown-разметку.</small>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i>Сохранить
                    </button>
                    <a href="{{ url_for('books.view', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const reviewEditor = document.getElementById('review-editor');
let reviewMDE = null;

if (reviewEditor && window.EasyMDE) {
    reviewMDE = new EasyMDE({
        element: reviewEditor,
        spellChecker: false,
        toolbar: ['bold', 'italic', '|', 'quote', 'unordered-list', '|', 'preview'],
        minHeight: '150px'
    });
}

const reviewForm = document.getElementById('review-form');
if (reviewForm) {
    reviewForm.addEventListener('submit', function () {
        if (reviewMDE) {
            reviewMDE.codemirror.save();
        }
    });
}
</script>
{% endblock %}
