{% extends 'base.html' %}
{% block title %}Вход — Электронная библиотека{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Вход в систему</h4>
        </div>
        <div class="card-body">
            <div class="alert alert-info small mb-4">
                <div class="fw-bold mb-2">Тестовые учётные записи для проверки:</div>
                <div><strong>Администратор:</strong> <code>admin</code> / <code>password123</code></div>
                <div><strong>Модератор:</strong> <code>moder</code> / <code>password123</code></div>
                <div><strong>Пользователь:</strong> <code>user1</code> / <code>password123</code></div>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="login" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
